<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigGenie — Health Check Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:     #0A7C6E;
    --teal-lt:  #13B0A0;
    --teal-dk:  #054F46;
    --sky:      #F0FAF9;
    --gold:     #F5A623;
    --ink:      #0D1F1D;
    --sub:      #5E7C79;
    --border:   #D6EEEB;
    --white:    #FFFFFF;
    --bg:       #E4F4F2;
    --pass:     #16A34A;
    --pass-bg:  #DCFCE7;
    --fail:     #DC2626;
    --fail-bg:  #FEE2E2;
    --hdr-h:    68px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--ink);
  }

  /* ══ HEADER ══════════════════════════════════ */
  .top-header {
    height: var(--hdr-h);
    background: linear-gradient(135deg, var(--teal-dk) 0%, var(--teal) 100%);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(5,79,70,.3);
  }
  .brand-left  { display: flex; align-items: center; gap: 12px; }
  .brand-icon  {
    width: 38px; height: 38px; background: var(--gold); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; color: var(--ink); flex-shrink: 0;
  }
  .brand-name    { font-family: 'Libre Baskerville', serif; font-size: 22px; color: #fff; font-weight: 700; }
  .brand-tagline { font-size: 11px; color: rgba(255,255,255,.55); font-style: italic; margin-top: 1px; }
  .brand-right   { display: flex; align-items: center; gap: 12px; }

  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
    color: #fff; padding: 7px 16px; border-radius: 7px;
    font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: background .2s;
  }
  .refresh-btn:hover { background: rgba(255,255,255,.22); }
  .refresh-btn.spinning svg { animation: spin .6s linear; }

  .status-summary {
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
    border-radius: 7px; padding: 7px 14px;
  }
  .sum-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sum-text { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; }

  /* ══ BODY AREA ════════════════════════════════ */
  .body-area {
    height: calc(100vh - var(--hdr-h));
    display: flex;
    gap: 10px;
    padding: 10px;
    overflow: hidden;
  }

  /* ══ COLUMNS ══════════════════════════════════ */
  .col-left, .col-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
    overflow: hidden;
  }

  /* ══ PANEL ════════════════════════════════════ */
  .panel {
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(10,124,110,.05);
    display: flex; flex-direction: column;
    overflow: hidden;
    flex: 1;
    min-height: 0;
    opacity: 0;
    animation: rise .4s ease forwards;
  }
  .col-left  .panel:nth-child(1) { animation-delay: .04s; }
  .col-left  .panel:nth-child(2) { animation-delay: .09s; }
  .col-right .panel:nth-child(1) { animation-delay: .13s; }
  .col-right .panel:nth-child(2) { animation-delay: .17s; }
  .col-right .panel:nth-child(3) { animation-delay: .21s; }

  /* ══ SECTION HEADER ═══════════════════════════ */
  .section-head {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; flex-shrink: 0;
    font-size: 11px; font-weight: 700;
    letter-spacing: .5px; text-transform: uppercase;
  }
  .sh-overall { background: #0A7C6E; color: #fff; }
  .sh-app     { background: #1A5F8A; color: #fff; }
  .sh-dash    { background: #6D35A0; color: #fff; }
  .sh-monitor { background: #A34A08; color: #fff; }
  .sh-digital { background: #A81919; color: #fff; }

  /* ══ SCROLLABLE TABLE WRAP ════════════════════ */
  .table-wrap {
    flex: 1; overflow-y: auto; overflow-x: hidden;
  }
  .table-wrap::-webkit-scrollbar { width: 3px; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ══ TABLE ════════════════════════════════════ */
  .check-table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
  .check-table thead { position: sticky; top: 0; z-index: 2; }
  .check-table thead th {
    background: var(--sky); padding: 6px 10px;
    text-align: left; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px; color: var(--sub);
    border-bottom: 2px solid var(--border);
  }
  .check-table tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  .check-table tbody tr:last-child { border-bottom: none; }
  .check-table tbody tr:hover { background: var(--sky); }
  .check-table td { padding: 6px 10px; vertical-align: middle; }

  .app-id {
    font-size: 9.5px; font-weight: 600; color: var(--sub);
    font-family: 'Courier New', monospace;
    background: var(--sky); padding: 1px 5px;
    border-radius: 3px; border: 1px solid var(--border); white-space: nowrap;
  }

  /* ══ REQUEST BUTTON ═══════════════════════════ */
  .req-btn {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--teal); color: #fff; border: none; border-radius: 5px;
    padding: 3px 9px; font-family: 'Outfit', sans-serif;
    font-size: 10.5px; font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: background .15s, transform .1s;
  }
  .req-btn:hover  { background: var(--teal-lt); transform: translateY(-1px); }
  .req-btn:active { transform: translateY(0); }
  .req-btn.loading { opacity: .6; pointer-events: none; }

  /* ══ STATUS BADGE ═════════════════════════════ */
  .status-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px; border-radius: 20px;
    font-size: 10px; font-weight: 700; white-space: nowrap;
  }
  .badge-pass    { background: var(--pass-bg); color: var(--pass); }
  .badge-fail    { background: var(--fail-bg); color: var(--fail); }
  .badge-pending { background: #FEF3C7; color: #92400E; font-style: italic; font-weight: 400; }
  .badge-dot     { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* ══ SO ON BUTTON ═════════════════════════════ */
  .so-on-row td   { padding: 6px 10px; text-align: center; background: var(--sky); }
  .so-on-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--white); border: 1.5px dashed var(--border);
    color: var(--sub); padding: 3px 12px; border-radius: 20px;
    font-family: 'Outfit', sans-serif; font-size: 10.5px; font-weight: 500;
    font-style: italic; cursor: pointer; transition: all .18s;
  }
  .so-on-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--sky); border-style: solid; }
  .so-on-btn:hover svg { transform: translateX(3px); }
  .so-on-btn svg { transition: transform .2s; }

  /* ══ SKELETON ═════════════════════════════════ */
  .skeleton {
    display: block; height: 11px; border-radius: 3px; width: 85%;
    background: linear-gradient(90deg,#f0f0f0 25%,#e2e2e2 50%,#f0f0f0 75%);
    background-size: 200% 100%; animation: shimmer 1.2s infinite;
  }

  /* ══ ANIMATIONS ═══════════════════════════════ */
  @keyframes rise    { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin    { to{transform:rotate(360deg)} }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════ -->
<div class="top-header">
  <div class="brand-left">
    <div class="brand-icon">DG</div>
    <div>
      <div class="brand-name">DigGenie</div>
      <div class="brand-tagline">One magic click to serve all Digital needs</div>
    </div>
  </div>
  <div class="brand-right">
    <div class="status-summary" id="summaryBadge">
      <div class="sum-dot" style="background:#facc15"></div>
      <div class="sum-text">Loading checks...</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Refresh All
    </button>
  </div>
</div>

<!-- ══ BODY ════════════════════════════════════ -->
<div class="body-area">

  <!-- LEFT: Overall + App Checkouts -->
  <div class="col-left">

    <div class="panel">
      <div class="section-head sh-overall">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Overall Application Checkouts
      </div>
      <div class="table-wrap">
        <table class="check-table">
          <thead><tr><th>Application</th><th>Action</th><th>Status</th></tr></thead>
          <tbody id="overallBody"><tr><td colspan="3"><span class="skeleton"></span></td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <div class="section-head sh-app">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        App Based Checkouts
      </div>
      <div class="table-wrap">
        <table class="check-table">
          <thead><tr><th>App ID</th><th>Application</th><th>Action</th><th>Status</th></tr></thead>
          <tbody id="appBody"><tr><td colspan="4"><span class="skeleton"></span></td></tr></tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- RIGHT: Dashboards + Monitoring + Digital Reporting -->
  <div class="col-right">

    <div class="panel">
      <div class="section-head sh-dash">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboards
      </div>
      <div class="table-wrap">
        <table class="check-table">
          <thead><tr><th>Dashboard</th><th>Action</th><th>Status</th></tr></thead>
          <tbody id="dashBody"><tr><td colspan="3"><span class="skeleton"></span></td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <div class="section-head sh-monitor">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Monitoring
      </div>
      <div class="table-wrap">
        <table class="check-table">
          <thead><tr><th>Monitor</th><th>Action</th><th>Status</th></tr></thead>
          <tbody id="monitorBody"><tr><td colspan="3"><span class="skeleton"></span></td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <div class="section-head sh-digital">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Digital Reporting
      </div>
      <div class="table-wrap">
        <table class="check-table">
          <thead><tr><th>Report</th><th>Action</th><th>Status</th></tr></thead>
          <tbody id="digitalBody"><tr><td colspan="3"><span class="skeleton"></span></td></tr></tbody>
        </table>
      </div>
    </div>

  </div>

</div>

<script>
const soOnBtn = (cols) =>
  `<tr class="so-on-row"><td colspan="${cols}">
    <button class="so-on-btn">So On......
      <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </td></tr>`;

function statusBadge(status) {
  if (!status) return `<span class="status-badge badge-pending"><span class="badge-dot"></span>—</span>`;
  const cls = status === 'Pass' ? 'badge-pass' : 'badge-fail';
  return `<span class="status-badge ${cls}"><span class="badge-dot"></span>${status}</span>`;
}

function reqBtn(section, name) {
  return `<button class="req-btn" onclick="runCheck('${section}','${encodeURIComponent(name)}',this)">
    <svg width="9" height="9" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Request
  </button>`;
}

function runCheck(section, name, btn) {
  const statusEl = btn.closest('tr').querySelector('.status-badge');
  btn.classList.add('loading'); btn.textContent = '...';
  setTimeout(() => {
    const result = Math.random() > 0.2 ? 'Pass' : 'Fail';
    if (statusEl) statusEl.outerHTML = statusBadge(result);
    btn.classList.remove('loading');
    btn.innerHTML = `<svg width="9" height="9" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg> Request`;
    updateSummary();
  }, 700 + Math.random() * 500);
}

function renderOverall(data) {
  document.getElementById('overallBody').innerHTML =
    data.map(r => `<tr>
      <td style="font-weight:500">${r.name}</td>
      <td>${reqBtn('overall', r.name)}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>`).join('') + soOnBtn(3);
}

function renderApp(data) {
  document.getElementById('appBody').innerHTML =
    data.map(r => `<tr>
      <td><span class="app-id">${r.app_id}</span></td>
      <td style="font-weight:500">${r.name}</td>
      <td>${reqBtn('app', r.name)}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>`).join('') + soOnBtn(4);
}

function renderDash(data) {
  document.getElementById('dashBody').innerHTML =
    data.map(r => `<tr>
      <td style="font-weight:500">${r.name}</td>
      <td>${reqBtn('dash', r.name)}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>`).join('') + soOnBtn(3);
}

function renderMonitor(data) {
  document.getElementById('monitorBody').innerHTML =
    data.map(r => `<tr>
      <td style="font-weight:500">${r.name}</td>
      <td>${reqBtn('monitor', r.name)}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>`).join('') + soOnBtn(3);
}

function renderDigital(data) {
  document.getElementById('digitalBody').innerHTML =
    data.map(r => `<tr>
      <td style="font-weight:500">${r.name}</td>
      <td>${reqBtn('digital', r.name)}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>`).join('') + soOnBtn(3);
}

function updateSummary() {
  let pass = 0, fail = 0;
  document.querySelectorAll('.status-badge').forEach(b => {
    if (b.classList.contains('badge-pass')) pass++;
    if (b.classList.contains('badge-fail')) fail++;
  });
  const total = pass + fail;
  const dot  = fail > 0 ? '#ef4444' : '#22c55e';
  const text = total > 0 ? `${pass} Pass · ${fail} Fail` : 'Loading checks...';
  document.getElementById('summaryBadge').innerHTML =
    `<div class="sum-dot" style="background:${dot}"></div><div class="sum-text">${text}</div>`;
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning'); btn.disabled = true;
  try {
    // ── MOCK DATA — replace with: const res = await fetch('/api/all'); const d = await res.json();
    const d = {
      overall_checkouts: [
        {name:"BAM Bundle",status:"Pass"},{name:"Membership Bundle",status:"Pass"},
        {name:"ECM Bundle",status:"Fail"},{name:"UCR Bundle",status:"Pass"},
        {name:"OTX Bundle",status:"Pass"},{name:"BMSP Bundle",status:"Pass"},
        {name:"EMA Bundle",status:"Fail"},{name:"Empower Set",status:"Pass"}
      ],
      dashboards: [
        {name:"TCS Digital Dyna Dashboard",status:null},{name:"ARES EOB Dashboard",status:null},
        {name:"TCS ARES AYS Dashboard",status:null},{name:"ARES EOB Dashboard Refresh",status:"Pass"}
      ],
      app_checkouts: [
        {app_id:"APP00000000",name:"Coverage API",status:"Pass"},
        {app_id:"APP00000001",name:"Claims API",status:"Pass"},
        {app_id:"APP00000002",name:"Legal Privacy Content API",status:"Fail"},
        {app_id:"APP00000003",name:"Member Restriction API",status:"Pass"},
        {app_id:"APP00000004",name:"Membership API (Future State)",status:"Pass"},
        {app_id:"APP00000005",name:"Member ID Card",status:"Pass"},
        {app_id:"APP00000006",name:"Member Profile User Interface",status:"Pass"},
        {app_id:"APP00000007",name:"BCBSor Native Mobile App",status:"Fail"},
        {app_id:"APP00000008",name:"Demographics API",status:"Pass"},
        {app_id:"APP00000009",name:"Contact Info API",status:"Pass"}
      ],
      monitoring: [
        {name:"OTX Critical Job Flow",status:"Pass"},{name:"UIB Stuck Record Monitoring",status:"Pass"},
        {name:"EOB Flow Monitoring",status:"Fail"},{name:"ECM Batch Flow",status:"Pass"},
        {name:"Captiva File Count",status:"Pass"},{name:"BMSP Rabbit MQ Monitoring",status:"Pass"},
        {name:"OTX/FSS Report",status:"Pass"},{name:"OTX/ORMB Flow",status:"Fail"}
      ],
      digital_reporting: [
        {name:"Incident Inventory",status:"Pass"},{name:"Open Task",status:"Pass"}
      ]
    };
    renderOverall(d.overall_checkouts);
    renderApp(d.app_checkouts);
    renderDash(d.dashboards);
    renderMonitor(d.monitoring);
    renderDigital(d.digital_reporting);
    updateSummary();
  } catch(err) {
    console.error('Load failed:', err);
  } finally {
    setTimeout(() => { btn.classList.remove('spinning'); btn.disabled = false; }, 600);
  }
}

document.addEventListener('DOMContentLoaded', loadAll);
</script>
</body>
</html>
